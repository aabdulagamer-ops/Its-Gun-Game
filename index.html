<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Night Horror: Wave Survival</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="flash"></div>
    <div id="hud">
        <div class="stat">HP: <span id="hp">100</span></div>
        <div class="stat">WAVE: <span id="wave">1</span></div>
        <div class="stat">AMMO: <span id="ammo">30</span>/30</div>
        <div id="boss-bar-container">
            <div id="boss-label">BOSS HP</div>
            <div id="boss-bar"><div id="boss-fill"></div></div>
        </div>
    </div>
    <div id="crosshair">+</div>
    <div id="menu">
        <h1 id="title">NIGHT HORROR</h1>
        <div id="startButton">SURVIVE THE NIGHT</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
